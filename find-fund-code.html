<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Fund Code</title>
<style>
  :root{--bg:#0a0d12;--panel:#12171f;--line:#232b38;--ink:#e8ecf2;--dim:#8b95a6;--gold:#c9a227;--gold-soft:#e0b94a}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;max-width:560px;margin:0 auto;padding:20px 16px}
  h1{font-size:16px;letter-spacing:.05em;margin-bottom:4px}
  p{color:var(--dim);font-size:13px;margin-bottom:16px;line-height:1.5}
  .box{display:flex;gap:8px;margin-bottom:16px}
  input{flex:1;font-size:15px;padding:12px;background:var(--panel);border:1px solid var(--line);border-radius:9px;color:var(--ink);outline:none}
  input:focus{border-color:var(--gold)}
  button{font-family:inherit;cursor:pointer;border:none}
  .go{padding:12px 16px;border-radius:9px;font-weight:600;background:linear-gradient(180deg,var(--gold-soft),var(--gold));color:#0a0d12}
  .item{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
  .item .n{flex:1;font-size:13px;line-height:1.4}
  .item .code{font-family:ui-monospace,monospace;font-size:16px;font-weight:700;color:var(--gold-soft)}
  .copy{padding:8px 12px;border-radius:8px;background:#171d27;border:1px solid var(--line);color:var(--ink);font-size:12px;font-weight:600}
  .copy:active{background:var(--gold);color:#0a0d12}
  .msg{color:var(--dim);font-size:13px;padding:14px 2px}
  a{color:var(--gold-soft)}
  .spin{display:inline-block;animation:sp 1s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <h1>Find your fund code</h1>
  <p>Type part of your fund name, tap Search, then tap Copy next to the right one. Paste that number into <b>config.json</b>.</p>
  <div class="box">
    <input id="q" placeholder="e.g. UTI Nifty 50 Index" autocomplete="off">
    <button class="go" onclick="search()">Search</button>
  </div>
  <div id="out"></div>
<script>
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
async function search(){
  const q=document.getElementById('q').value.trim();
  const out=document.getElementById('out');
  if(!q){out.innerHTML='<div class="msg">Type a fund name first.</div>';return;}
  out.innerHTML='<div class="msg"><span class="spin">&#8635;</span> Searching…</div>';
  const api='https://api.mfapi.in/mf/search?q='+encodeURIComponent(q);
  try{
    const r=await fetch(api);
    const list=await r.json();
    if(!list.length){out.innerHTML='<div class="msg">No match. Try fewer words.</div>';return;}
    out.innerHTML=list.slice(0,25).map(f=>`
      <div class="item">
        <div class="n">${esc(f.schemeName)}</div>
        <div class="code">${f.schemeCode}</div>
        <button class="copy" onclick="cp('${f.schemeCode}',this)">Copy</button>
      </div>`).join('');
  }catch(e){
    out.innerHTML='<div class="msg">Could not search here. Open this link instead and read the number after "schemeCode":<br><br><a href="'+esc(api)+'" target="_blank" rel="noopener">Open search results</a></div>';
  }
}
function cp(code,btn){
  navigator.clipboard&&navigator.clipboard.writeText(code);
  btn.textContent='Copied';setTimeout(()=>btn.textContent='Copy',1200);
}
document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter')search();});
</script>
</body>
</html>
