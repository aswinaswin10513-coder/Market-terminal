<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INVICTA-REIGN Terminal</title>
<style>
  :root{
    --bg:#0a0d12;--panel:#12171f;--panel-2:#171d27;--line:#232b38;--line-soft:#1b222d;
    --ink:#e8ecf2;--ink-dim:#8b95a6;--ink-faint:#5a6472;--gold:#c9a227;--gold-soft:#e0b94a;
    --up:#3fae6b;--down:#e05656;--amber-bg:#1c1810;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--ink)}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:15px;line-height:1.5;max-width:560px;margin:0 auto;padding-bottom:30px}
  .mono{font-family:"SF Mono",ui-monospace,"Roboto Mono",Menlo,monospace;font-variant-numeric:tabular-nums}
  header{padding:16px 16px 12px;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#0c1017,#0a0d12)}
  .brand{display:flex;align-items:center;gap:10px}
  .crest{width:30px;height:30px;flex:none;border-radius:5px;background:radial-gradient(circle at 50% 35%,#2a3140,#12171f);border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;color:var(--gold);font-weight:700;font-size:14px;box-shadow:inset 0 0 8px rgba(201,162,39,.25)}
  .brand h1{font-size:15px;font-weight:700;letter-spacing:.14em}
  .brand .sub{font-size:10px;color:var(--gold-soft);letter-spacing:.34em;font-weight:600;text-transform:uppercase;margin-top:1px}
  .upd{margin-left:auto;text-align:right;font-size:10px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.08em}
  .upd .g{color:var(--gold-soft);font-weight:600}
  main{padding:14px 12px 20px}
  .eyebrow{font-size:10px;letter-spacing:.28em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;margin:16px 2px 10px;display:flex;align-items:center;gap:8px}
  .eyebrow:first-child{margin-top:2px}
  .eyebrow::after{content:"";flex:1;height:1px;background:var(--line-soft)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
  .row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--line-soft)}
  .row:last-child{border-bottom:none}
  .row .lbl{min-width:0;flex:1}
  .row .lbl .n{font-weight:600;font-size:14px}
  .row .lbl .m{font-size:11px;color:var(--ink-faint);margin-top:1px}
  .row .val{text-align:right}
  .row .val .p{font-size:15px;font-weight:600}
  .row .val .c{font-size:11px;margin-top:1px;font-weight:600}
  .up{color:var(--up)}.down{color:var(--down)}.flat{color:var(--ink-dim)}
  .flag{display:inline-block;margin-left:6px;padding:1px 5px;border-radius:4px;font-size:9px;font-weight:700;background:var(--amber-bg);color:var(--gold-soft);border:1px solid rgba(201,162,39,.3);vertical-align:middle}
  .alertbox{background:var(--amber-bg);border:1px solid var(--gold);border-radius:12px;padding:12px 14px;margin-bottom:12px}
  .alertbox .h{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-soft);font-weight:700;margin-bottom:6px}
  .alertbox .a{font-size:13.5px;padding:3px 0;color:#e9dcb6}
  .news-item{display:block;padding:12px 14px;border-bottom:1px solid var(--line-soft);text-decoration:none;color:inherit}
  .news-item:last-child{border-bottom:none}
  .news-item:active{background:var(--panel-2)}
  .news-item .tl{font-size:13.5px;font-weight:500;line-height:1.4}
  .news-item .me{display:flex;gap:8px;margin-top:6px;font-size:10.5px;color:var(--ink-faint)}
  .news-item .src{color:var(--gold-soft);font-weight:600}
  .pill{display:inline-block;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:600;text-transform:uppercase;background:var(--panel-2);border:1px solid var(--line);color:var(--ink-dim)}
  .refresh{display:block;width:100%;padding:11px;border:1px solid var(--line);background:var(--panel-2);color:var(--gold-soft);border-radius:9px;font-weight:600;font-size:13px;margin-bottom:6px;cursor:pointer}
  .empty{padding:22px 16px;text-align:center;color:var(--ink-faint);font-size:13px}
  .spin{display:inline-block;animation:sp 1s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
  .foot{text-align:center;font-size:10.5px;color:var(--ink-faint);margin-top:18px;line-height:1.6}
</style>
</head>
<body>
<header>
  <div class="brand">
    <div class="crest">IR</div>
    <div><h1>INVICTA&nbsp;·&nbsp;REIGN</h1><div class="sub">Market Terminal</div></div>
    <div class="upd" id="upd">—</div>
  </div>
</header>
<main>
  <button class="refresh" id="refreshBtn">&#8635; Refresh</button>
  <div id="content"><div class="empty"><span class="spin">&#8635;</span> Loading…</div></div>
  <div class="foot">Track &amp; alert only. Never trades.<br>Prices update twice daily by the robot. Edit your watchlist in config.json.</div>
</main>

<script>
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function fmt(n){return n==null?'—':Number(n).toLocaleString('en-IN',{maximumFractionDigits:2});}
function chgHtml(pc){
  if(pc==null)return '<div class="c flat">no data</div>';
  const cls=pc>0.001?'up':pc<-0.001?'down':'flat';const s=pc>0?'+':'';
  return `<div class="c ${cls}">${s}${pc.toFixed(1)}%</div>`;
}
function ago(iso){
  if(!iso)return 'not yet';
  const s=(Date.now()-new Date(iso).getTime())/1000;
  if(s<3600)return Math.max(1,Math.floor(s/60))+'m ago';
  if(s<86400)return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}
function rows(items,valueKey){
  if(!items||!items.length)return '<div class="empty">Nothing here yet.</div>';
  return items.map(it=>{
    const flag=it.alert?'<span class="flag">&#9873; ALERT</span>':'';
    const v=valueKey==='nav'?it.nav:it.price;
    const sub=it.market?esc(it.market):'';
    return `<div class="row"><div class="lbl"><div class="n">${esc(it.name)}${flag}</div>${sub?`<div class="m">${sub}</div>`:''}</div>
      <div class="val"><div class="p mono">${fmt(v)}</div>${chgHtml(it.change_pct)}</div></div>`;
  }).join('');
}
async function load(){
  const c=document.getElementById('content');
  const btn=document.getElementById('refreshBtn');
  btn.innerHTML='<span class="spin">&#8635;</span> Loading';
  try{
    const r=await fetch('./data.json?t='+Date.now(),{cache:'no-store'});
    const d=await r.json();
    document.getElementById('upd').innerHTML = d.updated?`Updated<br><span class="g">${ago(d.updated)}</span>`:'<span class="g">Waiting</span>';
    let h='';
    if(d.alerts&&d.alerts.length){
      h+=`<div class="alertbox"><div class="h">&#9873; Alerts crossed your limit</div>${d.alerts.map(a=>`<div class="a">${esc(a)}</div>`).join('')}</div>`;
    }
    if(!d.updated){
      h+=`<div class="empty" style="padding:30px 16px">The robot has not run yet.<br>Go to the <b style="color:var(--gold-soft)">Actions</b> tab in GitHub and press <b>Run workflow</b> once.</div>`;
    }
    h+=`<div class="eyebrow">Markets</div><div class="card">${rows(d.market,'price')}</div>`;
    h+=`<div class="eyebrow">My funds</div><div class="card">${rows(d.funds,'nav')}</div>`;
    if(d.commodities&&d.commodities.length){
      h+=`<div class="eyebrow">Mandi prices</div><div class="card">${rows(d.commodities,'price')}</div>`;
    }
    h+=`<div class="eyebrow">Signal radar</div><div class="card">`;
    if(d.news&&d.news.length){
      h+=d.news.slice(0,25).map(a=>`<a class="news-item" href="${encodeURI(a.url)}" target="_blank" rel="noopener">
        <div class="tl">${esc(a.title)}</div><div class="me"><span class="pill">${esc(a.topic)}</span><span class="src">${esc(a.domain)}</span></div></a>`).join('');
    }else{ h+='<div class="empty">No headlines yet.</div>'; }
    h+='</div>';
    c.innerHTML=h;
  }catch(e){
    c.innerHTML='<div class="empty">Could not load data.json.<br>If the robot has not run yet, that is normal — run it once from the Actions tab.</div>';
    document.getElementById('upd').textContent='—';
  }
  btn.innerHTML='&#8635; Refresh';
}
document.getElementById('refreshBtn').onclick=load;
load();
</script>
</body>
</html>
